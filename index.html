<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/12af765dc4.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="cv">
      <div class="cv_left">
        <div class="cv_profile">
          <img src="pictures/images/22.jpg" alt="my photo" />
        </div>
        <div class="cv_content">
        <div class="cv_item cv_info">
          <div class="title">
            <p class="bold">Stepanov Sergey</p>
            <p class="regular">Student</p>
        </div>
        <ul>
       <li>
            <div class="icon"><i class="fas fa-map-signs"></i></div>
            <div class="data">
              Dzerzhinsk/Russia
            </div>
          </li>
          <li>
            <div class="icon"><i class="fab fa-discord"></i></div>
            <div class="data">
              Delskull#6885
            </div>
          </li>
          <li>
            <div class="icon"><i class="fas fa-envelope"></i></div>
            <div class="data">
              Deluta1989@gmail.com
            </div>
          </li>
          <li>
            <div class="icon"><i class="fab fa-weebly"></i></div>
            <div class="data">
              www.github.com/Delskull/
            </div>
          </li>
        </ul>
        <div class="cv_item cv_skills">
          <div class="title">
            <p class="bold">skill's</p>
        </div>
        <ul>
          <li>
            <div class="skill_name">
              HTML
            </div>
            <div class="skill_progress">
              <span style="width: 80%;"></span>
            </div>
            <div class="skill_per">70%</div>
          </li>
          <li>
            <div class="skill_name">
              CSS
            </div>
            <div class="skill_progress">
              <span style="width: 52%;"></span>
            </div>
            <div class="skill_per">52%</div>
          </li>
          <li>
            <div class="skill_name">
              JS
            </div>
            <div class="skill_progress">
              <span style="width: 23%;"></span>
            </div>
            <div class="skill_per">23%</div>
          </li>
        </ul>
        </div>
        <div class="cv_item cv_contact">
          <div class="title">
            <p class="bold">contact</p>
        </div>
        <ul>
          <li>
            <div class="icon"><i class="fab fa-vk"></i></div>
            <div class="data">
              <p class="semi_bold">
                Vk
              </p>
              <p>vk.com/id17356200</p>
            </div>
          </li>
          <li>
            <div class="icon"><i class="fab fa-instagram"></i></div>
            <div class="data">
              <p class="semi_bold">
                instagram
              </p>
              <p>@sstepancho</p>
            </div>
          </li>
        </ul>
        </div>
      </div>
      <div class="cv_right"></div>
    </div>
  </body>
</html>
